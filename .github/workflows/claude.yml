name: Claude Code

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Claude Code Base Action
        uses: anthropics/claude-code-base-action@v0.0.14
        with:
          prompt: ${{ github.event.comment.body }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
